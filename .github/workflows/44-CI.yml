name: Day 44 Complete CI

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Secret
        run: |
          if [ -z "${{ secrets.MY_SECRET_MESSAGE }}" ]; then
            echo "The secret is set: false"
          else
            echo "The secret is set: true"
          fi

      - name: Use Secret
        env:
          MY_SECRET: ${{ secrets.MY_SECRET_MESSAGE }}
        run: echo "Length: ${#MY_SECRET}"

      - name: Create File
        run: echo "Hello CI" > file.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: file
          path: file.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: file

      - run: cat file.txt

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: |
          chmod +x script.sh
          ./script.sh

  cache-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - run: npm install
