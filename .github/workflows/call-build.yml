name: Call Reusable Build

on:
  push:
    branches: [main]

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      app_name: my-web-app
      environment: production
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  print-version:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Debug Outputs
        run: echo '${{ toJson(needs.build.outputs) }}'

      - name: Print Version
        run: |
          VERSION="${{ needs.build.outputs.build_version }}"
          echo "Version: $VERSION"
