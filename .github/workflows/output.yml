name: Job Outputs

on: push

jobs:
  generate-date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.setdate.outputs.date }}

    steps:
      - name: Set Date
        id: setdate
        run: echo "date=$(date)" >> $GITHUB_OUTPUT

  use-date:
    runs-on: ubuntu-latest
    needs: generate-date

    steps:
      - name: Print Date
        run: echo "Today's date is ${{ needs.generate-date.outputs.today }}"
