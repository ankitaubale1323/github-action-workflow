name: hello
$USER: "Ankita"
on: 
 push: 
  branches: [main]
jobs:
  greet:
   runs-on: ubuntu-latest
   steps:
     - name: say hello to all
       run: echo "hii"
     - name: say bye to all
       run: echo "bye"
     - name : say hello to user
       env:
         $USER: "Ankita"
       run: echo "hello $USER"
