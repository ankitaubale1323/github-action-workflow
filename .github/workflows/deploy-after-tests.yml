name: Deploy After Tests

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy if success
        if: github.event.workflow_run.conclusion == 'success'
        run: echo "Deploying app 🚀"

      - name: Stop if failed
        if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo "Tests failed ❌ Deployment stopped"
          exit 1
